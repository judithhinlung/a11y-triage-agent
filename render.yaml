databases:
  # ------------------------------------------------------------------
  # PostgreSQL — shared database for all backend services
  # ------------------------------------------------------------------
  - name: a11y-db
    plan: free
    databaseName: a11y
    user: a11y_user

services:
  # ------------------------------------------------------------------
  # Frontend — React/Vite static site
  # ------------------------------------------------------------------
  - type: web
    name: a11y-frontend
    runtime: static
    rootDir: .
    buildCommand: npm ci && npx turbo build --filter=@a11y/frontend
    staticPublishPath: packages/frontend/dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ------------------------------------------------------------------
  # Crawler Service — Node.js/Express + Playwright + BullMQ
  # ------------------------------------------------------------------
  - type: web
    name: a11y-crawler-service
    runtime: node
    rootDir: .
    buildCommand: npm ci && npx playwright install --with-deps chromium && npx turbo build --filter=@a11y/crawler-service
    startCommand: node packages/crawler-service/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: REDIS_URL
        fromService:
          name: a11y-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: a11y-db
          property: connectionString

  # ------------------------------------------------------------------
  # Scanner Service — Python (placeholder, not yet implemented)
  # ------------------------------------------------------------------
  - type: web
    name: a11y-scanner-service
    runtime: python
    rootDir: packages/scanner-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8001
      - key: REDIS_URL
        fromService:
          name: a11y-redis
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: a11y-db
          property: connectionString

  # ------------------------------------------------------------------
  # Report Service — Python (placeholder, not yet implemented)
  # ------------------------------------------------------------------
  - type: web
    name: a11y-report-service
    runtime: python
    rootDir: packages/report-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8002
      - key: DATABASE_URL
        fromDatabase:
          name: a11y-db
          property: connectionString

  # ------------------------------------------------------------------
  # LLM Service — Python (placeholder, not yet implemented)
  # ------------------------------------------------------------------
  - type: web
    name: a11y-llm-service
    runtime: python
    rootDir: packages/llm-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8003
      - key: DATABASE_URL
        fromDatabase:
          name: a11y-db
          property: connectionString

  # ------------------------------------------------------------------
  # ML Service — Python (placeholder, not yet implemented)
  # ------------------------------------------------------------------
  - type: web
    name: a11y-ml-service
    runtime: python
    rootDir: packages/ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8004
      - key: DATABASE_URL
        fromDatabase:
          name: a11y-db
          property: connectionString

  # ------------------------------------------------------------------
  # Redis — required by BullMQ job queue in crawler-service
  # ------------------------------------------------------------------
  - type: redis
    name: a11y-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
